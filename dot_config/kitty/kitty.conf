# BEGIN_KITTY_FONTS
font_family      family="MesloLGS Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15
# END_KITTY_FONTS

term xterm-256color
background_opacity 1 
scrollback_lines 5000

remember_window_size no
initial_window_width  1500
initial_window_height 1000

remember_window_size no
hide_window_decorations titlebar-and-corners
confirm_os_window_close 0
tab_bar_edge top
#tab_bar_style powerline

inactive_text_alpha 0.2

enabled_layouts tall:bias=50;full_size=1;mirrored=false,grid
map ctrl+cmd+b layout_action bias 50 60 70
#map ctrl+cmd+d layout_action decrease_num_full_size_windows
#map ctrl+cmd+i layout_action increase_num_full_size_windows
map ctrl+cmd+m layout_action mirror toggle
map ctrl+cmd+l next_layout

map cmd+h neighboring_window left
map cmd+l neighboring_window right
map cmd+k neighboring_window up
map cmd+j neighboring_window down

map shift+cmd+h move_window left
map shift+cmd+l move_window right
map shift+cmd+k move_window up
map shift+cmd+j move_window down

map ctrl+cmd+= resize_window reset

map cmd+d detach_window ask

map cmd+enter launch

map ctrl+cmd+] move_tab_forward
map ctrl+cmd+[ move_tab_backward
map ctrl+cmd+t set_tab_title

active_tab_font_style bold
inactive_tab_font_style normal

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab 0

# Cursor Configuration
cursor_shape block
cursor_trail 1
cursor_trail_decay 0.1 0.30
cursor_trail_start_threshold 2

# Clipboard/Paste Configuration
clipboard_control write-clipboard write-primary read-clipboard read-primary no-append
select_by_word_characters @-./_~?&=%+#
strip_trailing_spaces smart
copy_on_select no
paste_actions quote-urls-at-prompt

# MacOS Specific
macos_option_as_alt yes
macos_show_window_title_in none

# Mouse Configuration
mouse_map ctrl+left press ungrabbed,grabbed mouse_click_url
open_url_with default

mouse_hide_wait	-3.0

# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

